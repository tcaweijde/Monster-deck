name: Feature Branch CI

on:
  push:
    branches:
      - 'feat/**'
      - 'feature/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy a preview to GitHub Pages'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:run
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'workflow_dispatch' && inputs.deploy == true
        with:
          path: dist

  deploy:
    needs: ci
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
