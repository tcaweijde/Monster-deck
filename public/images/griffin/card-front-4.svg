<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs><pattern id="p" width="24" height="24" patternUnits="userSpaceOnUse">
      <polygon points="12,2 22,12 12,22 2,12" fill="none" stroke="#c8860a" stroke-width="1" opacity="0.35"/>
    </pattern></defs>
  <!-- background -->
  <rect width="200" height="280" fill="#2a1a0a"/>
  <rect width="200" height="280" fill="url(#p)"/>
  <!-- border -->
  <rect x="6" y="6" width="188" height="268" rx="10" fill="none" stroke="#e8c44a" stroke-width="2" opacity="0.6"/>
  <rect x="10" y="10" width="180" height="260" rx="8" fill="none" stroke="#c8860a" stroke-width="1" opacity="0.4"/>
  <!-- top label -->
  <text x="100" y="34" text-anchor="middle" font-family="serif" font-size="13" fill="#e8c44a" opacity="0.9" font-weight="bold" letter-spacing="2">GRIFFIN</text>
  <!-- icon -->
  <text x="100" y="155" text-anchor="middle" font-size="72" dominant-baseline="middle">🦅</text>
  <!-- card number -->
  <text x="100" y="240" text-anchor="middle" font-family="serif" font-size="18" fill="#e8c44a" opacity="0.7">★★★★</text>
  <!-- corner pips -->
  <text x="18" y="26" font-size="12" fill="#c8860a" opacity="0.8">4</text>
  <text x="182" y="266" font-size="12" text-anchor="end" fill="#c8860a" opacity="0.8" transform="rotate(180,182,264)">4</text>
</svg>